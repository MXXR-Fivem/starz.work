        - bearerAuth: []
      responses:
        "200":
          description: WeLoveDevs synchronization completed or skipped
          content:
            application/json:
              schema:
                type: object
                required: [success, message, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: WeLoveDevs sync completed
                  data:
                    type: object
                    required: [skipped, fetchedCount, insertedCount, totalCount, durationMs]
                    properties:
                      skipped:
                        type: boolean
                        example: false
                      reason:
                        type: string
                        enum: [disabled, missing_api_key]
                      fetchedCount:
                        type: integer
                        example: 100
                      insertedCount:
                        type: integer
                        example: 12
                      totalCount:
                        type: integer
                        example: 246
                      durationMs:
                        type: integer
