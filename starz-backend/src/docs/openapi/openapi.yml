components:
  schemas:
    ApiSuccess:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request handled successfully

    ApiError:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Internal server error
    DebugCodeData:
      type: object
      description: Empty in production. May include a debug code outside production when AUTH_DEBUG_TOKENS=true.
      properties:
        code:
          type: string
          example: "123456"
    DebugCodeResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DebugCodeData"
    ValidationError:
      allOf:
        - $ref: "#/components/schemas/ApiError"
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                required:
                  - path
                  - message
                properties:
                  path:
                    type: string
                    example: email
                  message:
                    type: string
                    example: Invalid email format

    HealthResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: API is healthy
    AuthUser:
      type: object
      required:
        - id
        - orgaId
        - companyRole
        - firstName
        - lastName
        - status
        - darkMode
        - role
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 12
        email:
          type: string
          nullable: true
          format: email
          example: user@example.com
        orgaId:
          type: integer
          nullable: true
          example: 3
        companyRole:
          type: string
          nullable: true
          enum: [owner, member]
          example: owner
        firstName:
          type: string
          example: Ada
        lastName:
          type: string
          example: Lovelace
        dateOfBirth:
          type: string
          nullable: true
          format: date-time
          example: "1990-06-01T00:00:00.000Z"
        status:
          type: string
          enum: [en_recherche, recruteur]
          example: en_recherche
        bannedAt:
          type: string
          nullable: true
          format: date-time
        banReason:
          type: string
          nullable: true
        profilePhotoUrl:
          type: string
          nullable: true
          example: /uploads/users/12/profile-photo-1713868800000.png
        shortBio:
          type: string
          nullable: true
          maxLength: 500
          example: Backend developer focused on TypeScript and product quality.
        linkedinUrl:
          type: string
          nullable: true
          format: uri
          example: https://www.linkedin.com/in/ada-lovelace
        githubUrl:
          type: string
          nullable: true
          format: uri
          example: https://github.com/ada
        portfolioUrl:
          type: string
          nullable: true
          format: uri
          example: https://ada.dev
        workLocation:
          type: string
          nullable: true
          example: Paris or remote
        cvUrl:
          type: string
          nullable: true
          example: /uploads/users/12/cv-1713868800000.pdf
        cvFilename:
          type: string
          nullable: true
          example: ada-lovelace-cv.pdf
        darkMode:
          type: boolean
          example: false
        skills:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: integer
                example: 4
              name:
                type: string
                example: TypeScript
        linkedProviders:
          type: array
          items:
            $ref: "#/components/schemas/OAuthProvider"
          example: [google, github]
        role:
          type: string
          example: user
        emailVerifiedAt:
          type: string
          nullable: true
          format: date-time
          example: "2026-04-23T11:42:00.000Z"
        lastLoginAt:
          type: string
          nullable: true
          format: date-time
          example: "2026-04-23T11:40:00.000Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-23T11:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-23T11:40:00.000Z"

    AuthTokens:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          example: eyJhbGciOi...
        refreshToken:
          type: string
          example: 5cd70d4ce9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: string
          example: 15m
    AuthSession:
      type: object
      required:
        - id
        - ipAddress
        - userAgent
        - expiresAt
        - lastSeenAt
        - createdAt
        - isCurrentSession
      properties:
        id:
          type: integer
          example: 12
        ipAddress:
          type: string
          nullable: true
          example: "::1"
        userAgent:
          type: string
          nullable: true
          example: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36
        expiresAt:
          type: string
          format: date-time
          example: "2026-05-24T11:40:00.000Z"
        lastSeenAt:
          type: string
          nullable: true
          format: date-time
          example: "2026-04-24T11:40:00.000Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-23T11:30:00.000Z"
        isCurrentSession:
          type: boolean
          example: true
    OAuthProvider:
      type: string
      enum: [google, github, linkedin]
      example: google

    AuthRegisterPayload:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: supersecurepassword
        firstName:
          type: string
          example: Ada
        lastName:
          type: string
          example: Lovelace
        dateOfBirth:
          type: string
          format: date
          example: "1990-06-01"
        status:
          type: string
          enum: [en_recherche, recruteur]
          example: en_recherche

    AuthLoginPayload:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: supersecurepassword
    AuthLogoutPayload:
      type: object
      properties:
        refreshToken:
          type: string
          example: 5cd70d4ce9...
    AuthRefreshPayload:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: 5cd70d4ce9...
    AuthUpdateMePayload:
      type: object
      properties:
        firstName:
          type: string
          example: Ada
        lastName:
          type: string
          example: Lovelace
        dateOfBirth:
          type: string
          nullable: true
          format: date
          example: "1990-06-01"
        status:
          type: string
          enum: [en_recherche, recruteur]
          example: recruteur
        shortBio:
          type: string
          nullable: true
          maxLength: 500
          example: Backend developer focused on TypeScript and product quality.
        linkedinUrl:
          type: string
          nullable: true
          format: uri
