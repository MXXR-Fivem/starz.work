  /offers:
    get:
      tags:
        - Offers
      summary: Search and list offers
      description: Public endpoint. Only published and approved offers are returned.
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: companyId
          schema:
            type: integer
            minimum: 1
        - in: query
          name: city
          description: City name to geocode before applying distance filtering. Uses radiusKm or 10 km by default.
          schema:
            type: string
            example: Paris
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: contractType
          schema:
            type: string
        - in: query
          name: remotePolicy
          schema:
            type: string
        - in: query
          name: premium
          schema:
            type: boolean
        - in: query
          name: salaryMin
          schema:
            type: number
            minimum: 0
        - in: query
          name: salaryMax
          schema:
            type: number
            minimum: 0
        - in: query
          name: skillIds
          schema:
            type: string
            example: "1,2,3"
        - in: query
          name: skills
          schema:
            type: string
            example: "node,typescript"
        - in: query
          name: lat
          schema:
            type: number
            minimum: -90
            maximum: 90
        - in: query
          name: lng
          schema:
            type: number
            minimum: -180
            maximum: 180
        - in: query
          name: radiusKm
          description: Radius around lat/lng or city. Defaults to 10 when city is provided without radiusKm.
          schema:
            type: number
            minimum: 0
            exclusiveMinimum: true
            maximum: 1000
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - publishedAt
              - createdAt
              - updatedAt
              - title
              - salaryMin
              - salaryMax
              - distance
              - premiumThenDate
            default: publishedAt
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
