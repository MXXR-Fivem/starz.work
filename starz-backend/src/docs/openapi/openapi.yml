openapi: 3.0.3
info:
  title: Starz Backend API
  version: 1.0.0
  description: Core OpenAPI documentation for the Starz backend.
servers:
  - url: http://localhost:3001
    description: Local development server
tags:
  - name: Health
    description: Service status endpoints
  - name: Auth
    description: Authentication, token, OAuth login, and session endpoints
  - name: Me
    description: Authenticated user profile, account, and saved offer endpoints
  - name: Applications
    description: Authenticated user applications endpoints
  - name: Notifications
    description: Authenticated user inbox notification endpoints
  - name: Company
    description: Company dashboard, members, invitations, offers, and applications endpoints
  - name: Staff
    description: Staff administration endpoints
  - name: Offers
    description: Offer discovery and management endpoints
paths:
  /health:
    get:
      tags:
        - Health
      summary: Check API health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a local account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterPayload"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginPayload"
      responses:
        "200":
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/oauth/{provider}/url:
    get:
      tags:
        - Auth
      summary: Generate OAuth authorization URL
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
        - in: query
          name: redirectUri
          required: true
          schema:
            type: string
            format: uri
          description: Frontend callback URI, typically `/auth/callback/{provider}`.
        - in: query
          name: state
          required: false
          schema:
            type: string
            example: '{"provider":"github","mode":"login","redirectTo":"/"}'
          description: Frontend context echoed back by the OAuth provider, for example login vs link flow.
      responses:
        "200":
          description: OAuth URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthOAuthUrlResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/oauth/{provider}:
    post:
      tags:
        - Auth
      summary: Authenticate with OAuth provider code
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthOAuthCallbackPayload"
      responses:
        "200":
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke current session or all sessions
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLogoutPayload"
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate refresh token and issue fresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshPayload"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/sessions:
    get:
      tags:
        - Auth
      summary: List active authenticated user sessions
      description: The target user is inferred from the bearer access token. Only sessions belonging to the authenticated user are returned.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sessions fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - Auth
      summary: Revoke all authenticated user sessions
      description: The target user is inferred from the bearer access token. Only sessions belonging to the authenticated user are revoked.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/sessions/{sessionId}:
    delete:
      tags:
        - Auth
      summary: Revoke one authenticated user session
      description: The target user is inferred from the bearer access token. The session is revoked only if it belongs to the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me:
    get:
      tags:
        - Me
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags:
        - Me
      summary: Update authenticated user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthUpdateMePayload"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - Me
      summary: Delete authenticated user account and personal data
      description: Deletes the authenticated user. Related sessions, refresh tokens, OAuth providers, email verification codes, favorites and applications are removed through database cascades.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/delete-code:
    post:
      tags:
        - Me
      summary: Request account deletion confirmation code
      description: Sends a short-lived confirmation code to the authenticated user's email address.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Confirmation code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugCodeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/profile-photo:
    put:
      tags:
        - Me
      summary: Upload or replace authenticated user profile photo
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: x-filename
          required: false
          schema:
            type: string
            example: avatar.png
      requestBody:
        required: true
        content:
          image/jpeg:
            schema:
              type: string
              format: binary
          image/png:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Profile photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Uploaded file is too large
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/data:
    get:
      tags:
        - Me
      summary: Get authenticated user dashboard data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User dashboard data fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeDashboardDataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/cv:
    put:
      tags:
        - Me
      summary: Upload or replace authenticated user CV
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: x-filename
          required: false
          schema:
            type: string
            example: ada-lovelace-cv.pdf
      requestBody:
        required: true
        content:
          application/pdf:
            schema:
              type: string
              format: binary
          application/msword:
            schema:
              type: string
              format: binary
          application/vnd.openxmlformats-officedocument.wordprocessingml.document:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: CV uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Uploaded file is too large
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/oauth/{provider}:
    post:
      tags:
        - Me
      summary: Link an OAuth provider to authenticated user account
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthOAuthCallbackPayload"
      responses:
        "200":
          description: OAuth provider linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/password-code:
    post:
      tags:
        - Me
      summary: Request password update confirmation code
      description: Sends a short-lived confirmation code to the authenticated user's email address.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Confirmation code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugCodeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/password:
    patch:
      tags:
        - Me
      summary: Update authenticated user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthUpdatePasswordPayload"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/verify-email:
    post:
      tags:
        - Auth
      summary: Verify email with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyEmailPayload"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/resend-verification:
    post:
      tags:
        - Auth
      summary: Resend email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailPayload"
      responses:
        "200":
          description: Verification request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerificationCodeOptionalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailPayload"
      responses:
        "200":
          description: Reset request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenOptionalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthResetPasswordPayload"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /applications:
    get:
      tags:
        - Applications
      summary: List authenticated user current applications
      description: Returns applications linked to offers that are still available.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ApplicationStatus"
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Applications fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Applications
      summary: Apply to an offer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationPayload"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/favorites:
    get:
      tags:
        - Me
      summary: List authenticated user favorite offers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Favorite offers fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteApplicationsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Me
      summary: Add an offer to authenticated user favorites
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteOfferPayload"
      responses:
        "201":
          description: Favorite offer added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteApplicationsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/favorites/{offerId}:
    delete:
      tags:
        - Me
      summary: Remove an offer from authenticated user favorites
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorite offer removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /applications/expired:
    get:
      tags:
        - Applications
      summary: List authenticated user applications with unavailable offers
      description: Returns applications whose offer is closed, rejected, unpublished, or past its expiration date.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ApplicationStatus"
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Expired applications fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /applications/{applicationId}:
    get:
      tags:
        - Applications
      summary: Get authenticated user application
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /applications/{applicationId}/withdraw:
    patch:
      tags:
        - Applications
      summary: Withdraw authenticated user application
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application withdrawn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /notifications:
    get:
      tags:
        - Notifications
      summary: List authenticated user notifications
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: seen
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Notifications fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /notifications/seen:
    patch:
      tags:
        - Notifications
      summary: Mark one or more notifications as seen
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNotificationsSeenPayload"
      responses:
        "200":
          description: Notifications marked as seen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkNotificationsSeenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /company:
    get:
      tags:
        - Company
      summary: Get authenticated user company
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Company fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Company
      summary: Create a company for the authenticated user
      description: The creator becomes company owner. One company membership per user is currently supported.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyCreatePayload"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
